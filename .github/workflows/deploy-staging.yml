name: Deploy to Main (SSH)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEV_CPANEL_ONTIME_CITY_MAIN_SSH_KEY }}

      - name: Add host
        shell: bash
        run: |
          install -d -m 700 "$HOME/.ssh"
          touch "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
          ssh-keyscan -H "${{ secrets.DEV_CPANEL_ONTIME_CITY_MAIN_HOST }}" >> "$HOME/.ssh/known_hosts"

      - name: SSH deploy
        run: |
          ssh ${{ secrets.DEV_CPANEL_ONTIME_CITY_MAIN_USER }}@${{ secrets.DEV_CPANEL_ONTIME_CITY_MAIN_HOST }} << 'EOF'
            cd /home/ontime-dev-cpanel/htdocs/dev.cpanel.ontime.city

            # Fetch latest changes
            git fetch origin main
            
            # Reset to origin/main to avoid conflicts
            git reset --hard origin/main

            # migrate changes in db
            php artisan migrate --force

            # Install/update dependencies
            composer install --no-dev --optimize-autoloader

            # Clear caches so Blade/config changes are visible immediately
            php artisan view:clear
            php artisan config:clear
            php artisan cache:clear
          EOF
